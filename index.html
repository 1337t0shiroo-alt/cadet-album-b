<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #startButton {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 18px 36px; font-size: 18px; font-weight: bold;
            background: #002d5e; color: #d4af37; border: 2px solid #d4af37;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
        }
        #muteButton {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            width: 60px; height: 60px; background: rgba(0, 45, 94, 0.85);
            color: #d4af37; border: 1px solid #d4af37; border-radius: 50%;
            cursor: pointer; display: none; font-size: 24px;
        }
    </style>
</head>
<body>

    <button id="startButton">Загрузка...</button>
    <button id="muteButton">🔇</button>

    <a-scene id="main-scene" color-space="sRGB" renderer="colorManagement: true, precision: medium;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="ar-video" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted preload="auto"></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
            <a-video src="#ar-video" width="1" height="1.42" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        // 1. Получаем ID из ссылки (?id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || '1'; // По умолчанию 1

        const video = document.querySelector('#ar-video');
        const sceneEl = document.querySelector('a-scene');
        const targetEntity = document.querySelector('#target-entity');
        const startButton = document.querySelector('#startButton');
        const muteButton = document.querySelector('#muteButton');

        // 2. Настраиваем пути к файлам
        const targetPath = `./targets/${userId}.mind`;
        const videoPath = `./videos/${userId}.mp4`;

        // 3. Устанавливаем маркер и видео до запуска сцены
        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${targetPath}; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001;`);
        video.setAttribute('src', videoPath);

        // Когда всё готово, меняем текст на кнопке
        startButton.innerText = "Оживить фото";

        startButton.addEventListener('click', () => {
            sceneEl.systems['mindar-image-system'].start();
            video.play().then(() => video.pause());
            startButton.style.display = 'none';
            muteButton.style.display = 'block';
        });

        muteButton.addEventListener('click', () => {
            video.muted = !video.muted;
            muteButton.innerText = video.muted ? '🔇' : '🔊';
        });

        sceneEl.addEventListener('targetFound', () => video.play());
        sceneEl.addEventListener('targetLost', () => video.pause());

        // Подстраховка от зависаний
        setInterval(() => {
            if (!video.paused && video.readyState >= 2) {
                video.currentTime += 0.01;
            }
        }, 1000);
    </script>
</body>
</html>
