<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>AR Альбом - ДВЮИ МВД</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Кнопка старта */
        #startButton {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 20px 40px; font-size: 18px; font-weight: bold;
            background: #002d5e; color: #d4af37; border: 2px solid #d4af37;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
        }

        /* Главный контейнер плеера */
        #playerOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 20000;
            display: none; align-items: center; justify-content: center;
        }

        #mainVideo {
            width: 100%; max-height: 100%; outline: none;
        }

        #closeBtn {
            position: absolute; top: 25px; right: 20px; z-index: 20001;
            padding: 12px 20px; background: #d4af37; color: #002d5e;
            border-radius: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #scanStatus {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; color: #fff; background: rgba(0,0,0,0.6);
            padding: 10px 25px; border-radius: 30px; border: 1px solid #d4af37;
            pointer-events: none; text-align: center; font-size: 14px;
        }
    </style>
</head>
<body>

    <button id="startButton">ОТКРЫТЬ КАМЕРУ</button>

    <div id="scanStatus">Поиск фотографии курсанта...</div>

    <div id="playerOverlay">
        <div id="closeBtn">ЗАКРЫТЬ [X]</div>
        <video id="mainVideo" controls playsinline webkit-playsinline></video>
    </div>

    <a-scene id="main-scene" 
        mindar-image="autoStart: false; uiScanning: no;" 
        embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const squadId = params.get('squad') || '1'; 
        const count = parseInt(params.get('count')) || 4; 

        const sceneEl = document.querySelector('#main-scene');
        const startBtn = document.getElementById('startButton');
        const player = document.getElementById('playerOverlay');
        const video = document.getElementById('mainVideo');
        const closeBtn = document.getElementById('closeBtn');
        const status = document.getElementById('scanStatus');

        // Подключаем библиотеку маркеров
        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./targets/squad${squadId}.mind; autoStart: false; uiScanning: no;`);

        // Создаем невидимые триггеры для каждого курсанта
        for (let i = 0; i < count; i++) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            entity.addEventListener('targetFound', () => {
                // Если плеер уже открыт — игнорируем
                if (player.style.display === 'flex') return;

                const videoPath = `./videos/${squadId}_${i}.mp4`;
                
                // Запускаем видео в плеере
                video.src = videoPath;
                player.style.display = 'flex';
                video.load(); // Важно: принудительная перезагрузка источника
                video.play();
                status.style.display = 'none';
            });

            sceneEl.appendChild(entity);
        }

        // Кнопка закрытия: полностью очищаем состояние
        closeBtn.addEventListener('click', () => {
            video.pause();
            video.src = ""; // Очищаем путь, чтобы избежать кэширования черного кадра
            player.style.display = 'none';
            status.style.display = 'block';
        });

        // Старт работы
        startBtn.addEventListener('click', () => {
            sceneEl.systems['mindar-image-system'].start();
            startBtn.style.display = 'none';
        });

        // Обработка ошибок видео
        video.onerror = () => {
            alert("Ошибка загрузки видео. Проверьте интернет или название файла.");
            player.style.display = 'none';
        };
    </script>
</body>
</html>
