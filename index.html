<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>AR Альбом - ДВЮИ МВД</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #startButton {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 20px 40px; font-size: 18px; font-weight: bold;
            background: #002d5e; color: #d4af37; border: 2px solid #d4af37;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
        }

        /* Тот самый ПСЕВДО-FULLSCREEN */
        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 30000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        #uiVideo {
            width: 100%; height: auto; max-height: 100%;
            object-fit: contain; /* Чтобы горизонтальное видео не растягивалось */
        }

        #closeBtn {
            position: absolute; top: 30px; right: 20px; z-index: 30001;
            padding: 15px 25px; background: #d4af37; color: #002d5e;
            border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; border: none;
        }

        #scanStatus {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; color: #fff; background: rgba(0,0,0,0.7);
            padding: 10px 25px; border-radius: 30px; border: 1px solid #d4af37;
            pointer-events: none; text-align: center; font-size: 14px;
        }
    </style>
</head>
<body>

    <button id="startButton">ОТКРЫТЬ КАМЕРУ</button>

    <div id="scanStatus">Наведите камеру на фотографию</div>

    <div id="videoOverlay">
        <button id="closeBtn">ЗАКРЫТЬ [X]</button>
        <video id="uiVideo" controls playsinline webkit-playsinline></video>
    </div>

    <a-scene id="main-scene" 
        mindar-image="autoStart: false; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
        embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const squadId = params.get('squad') || '1'; 
        const count = parseInt(params.get('count')) || 4; 

        const sceneEl = document.querySelector('#main-scene');
        const startBtn = document.getElementById('startButton');
        const overlay = document.getElementById('videoOverlay');
        const video = document.getElementById('uiVideo');
        const closeBtn = document.getElementById('closeBtn');
        const status = document.getElementById('scanStatus');

        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./targets/squad${squadId}.mind; autoStart: false; uiScanning: no;`);

        // Создаем невидимые триггеры
        for (let i = 0; i < count; i++) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            entity.addEventListener('targetFound', () => {
                if (overlay.style.display === 'flex') return;

                // Важный трюк: добавляем случайное число к ссылке (cache-buster),
                // чтобы браузер каждый раз подгружал видео заново без черных кадров.
                const videoPath = `./videos/${squadId}_${i}.mp4?v=${new Date().getTime()}`;
                
                video.src = videoPath;
                overlay.style.display = 'flex';
                status.style.display = 'none';
                
                // Небольшая задержка перед воспроизведением для плавности
                setTimeout(() => {
                    video.play().catch(e => console.log("Нужен клик для звука"));
                }, 100);
            });

            sceneEl.appendChild(entity);
        }

        // Закрытие плеера
        closeBtn.addEventListener('click', () => {
            video.pause();
            video.removeAttribute('src'); // Полностью выгружаем видео
            video.load();
            overlay.style.display = 'none';
            status.style.display = 'block';
        });

        startBtn.addEventListener('click', () => {
            sceneEl.systems['mindar-image-system'].start();
            startBtn.style.display = 'none';
        });
    </script>
</body>
</html>
