<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>AR Альбом - ДВЮИ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Кнопка старта */
        #startButton {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 18px 36px; font-size: 18px; font-weight: bold;
            background: #002d5e; color: #d4af37; border: 2px solid #d4af37;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
        }

        /* Кнопка звука */
        #muteButton {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            width: 60px; height: 60px; background: rgba(0, 45, 94, 0.85);
            color: #d4af37; border: 1px solid #d4af37; border-radius: 50%;
            cursor: pointer; display: none; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <button id="startButton">Загрузка...</button>
    <button id="muteButton" style="display:none;">🔇</button>

    <a-scene id="main-scene" 
        mindar-image="imageTargetSrc: ./targets/squad1.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 5;" 
        color-space="sRGB" renderer="colorManagement: true, precision: medium;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets id="video-assets"></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const squadId = params.get('squad') || '1'; 
        const count = parseInt(params.get('count')) || 4; 

        const sceneEl = document.querySelector('#main-scene');
        const assetsEl = document.querySelector('#video-assets');
        const startButton = document.getElementById('startButton');
        const muteButton = document.getElementById('muteButton');

        // Настройка пути к маркеру
        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./targets/squad${squadId}.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001; uiScanning: no;`);

        // Создаем видео для каждого курсанта
        for (let i = 0; i < count; i++) {
            const v = document.createElement('video');
            v.id = `vid${i}`;
            v.src = `./videos/${squadId}_${i}.mp4`;
            v.setAttribute('loop', 'true');
            v.setAttribute('crossorigin', 'anonymous');
            v.setAttribute('playsinline', '');
            v.setAttribute('webkit-playsinline', '');
            v.muted = true; // Видео ВСЕГДА должно начинаться без звука
            assetsEl.appendChild(v);

            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            const plane = document.createElement('a-video');
            plane.setAttribute('src', `#vid${i}`);
            plane.setAttribute('width', '1');
            plane.setAttribute('height', '1.42');
            
            entity.appendChild(plane);
            sceneEl.appendChild(entity);

            entity.addEventListener('targetFound', () => v.play());
            entity.addEventListener('targetLost', () => v.pause());
        }

        startButton.innerText = "Оживить альбом";

        startButton.addEventListener('click', () => {
            sceneEl.systems['mindar-image-system'].start();
            
            // "Будим" все видео сразу, чтобы браузер разрешил звук
            document.querySelectorAll('video').forEach(vid => {
                vid.play().then(() => vid.pause());
            });

            startButton.style.display = 'none';
            muteButton.style.display = 'flex';
        });

        // ЛОГИКА ЗВУКА
        muteButton.addEventListener('click', () => {
            const allVideos = document.querySelectorAll('video');
            const isCurrentlyMuted = allVideos[0].muted;

            allVideos.forEach(vid => {
                vid.muted = !isCurrentlyMuted;
            });

            muteButton.innerText = isCurrentlyMuted ? '🔊' : '🔇';
        });

        // Плавная прокрутка кадров (защита от замирания)
        setInterval(() => {
            document.querySelectorAll('video').forEach(vid => {
                if (!vid.paused && vid.readyState >= 2) vid.currentTime += 0.01;
            });
        }, 1000);
    </script>
</body>
</html>
