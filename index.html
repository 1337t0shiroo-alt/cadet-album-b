<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>AR Альбом - ДВЮИ МВД</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #startButton {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 20px 40px; font-size: 18px; font-weight: bold;
            background: #002d5e; color: #d4af37; border: 2px solid #d4af37;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
        }

        /* Тот самый слой для "Разворачивания" */
        #fsContainer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 30000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        #fsVideo { width: 100%; height: auto; max-height: 100%; }

        #closeBtn {
            position: absolute; top: 30px; right: 20px; z-index: 30001;
            padding: 15px 25px; background: #d4af37; color: #002d5e;
            border-radius: 10px; font-weight: bold; border: none;
        }

        #scanOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; display: none; /* Слой для улавливания клика */
        }
    </style>
</head>
<body>

    <button id="startButton">ОТКРЫТЬ КАМЕРУ</button>
    <div id="scanOverlay"></div>

    <div id="fsContainer">
        <button id="closeBtn">ЗАКРЫТЬ [X]</button>
        <video id="fsVideo" controls playsinline webkit-playsinline></video>
    </div>

    <a-scene id="main-scene" 
        mindar-image="autoStart: false; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
        embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets id="video-assets"></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const squadId = params.get('squad') || '1'; 
        const count = parseInt(params.get('count')) || 4; 

        const sceneEl = document.querySelector('#main-scene');
        const startBtn = document.getElementById('startButton');
        const fsContainer = document.getElementById('fsContainer');
        const fsVideo = document.getElementById('fsVideo');
        const closeBtn = document.getElementById('closeBtn');
        const scanOverlay = document.getElementById('scanOverlay');

        let activeVideo = null;

        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./targets/squad${squadId}.mind; autoStart: false; uiScanning: no;`);

        for (let i = 0; i < count; i++) {
            const v = document.createElement('video');
            v.id = `vid${i}`;
            v.src = `./videos/${squadId}_${i}.mp4`;
            v.setAttribute('loop', 'true');
            v.setAttribute('crossorigin', 'anonymous');
            v.setAttribute('playsinline', '');
            v.muted = true;
            document.getElementById('video-assets').appendChild(v);

            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            const plane = document.createElement('a-video');
            plane.setAttribute('src', `#vid${i}`);
            plane.setAttribute('width', '1'); 
            plane.setAttribute('height', '0.56');
            
            entity.appendChild(plane);
            sceneEl.appendChild(entity);

            entity.addEventListener('targetFound', () => {
                v.play();
                activeVideo = v;
                scanOverlay.style.display = 'block';
            });

            entity.addEventListener('targetLost', () => {
                v.pause();
                if (activeVideo === v) {
                    activeVideo = null;
                    scanOverlay.style.display = 'none';
                }
            });
        }

        // КЛИК ПО ЭКРАНУ -> "РАЗВЕРНУТЬ"
        scanOverlay.addEventListener('click', () => {
            if (!activeVideo) return;

            // Синхронизируем время AR-видео и полноэкранного видео
            fsVideo.src = activeVideo.src;
            fsVideo.currentTime = activeVideo.currentTime;
            
            activeVideo.pause(); // AR видео на паузу
            fsContainer.style.display = 'flex';
            fsVideo.play();
        });

        // ЗАКРЫТЬ -> ВЕРНУТЬСЯ В AR
        closeBtn.addEventListener('click', () => {
            if (activeVideo) {
                activeVideo.currentTime = fsVideo.currentTime;
                // activeVideo.play() сработает сам, если камера всё еще видит фото
            }
            fsVideo.pause();
            fsVideo.src = "";
            fsContainer.style.display = 'none';
        });

        startBtn.addEventListener('click', () => {
            sceneEl.systems['mindar-image-system'].start();
            startBtn.style.display = 'none';
        });
    </script>
</body>
</html>
