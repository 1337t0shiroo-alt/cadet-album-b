<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>AR Альбом - Магия ДВЮИ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #startButton {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 20px 40px; font-size: 18px; font-weight: bold;
            background: #002d5e; color: #d4af37; border: 2px solid #d4af37;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
        }

        /* Полноэкранный плеер (для детального просмотра) */
        #fsContainer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 30000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #fsVideo { width: 100%; height: auto; max-height: 100%; }
        #closeBtn {
            position: absolute; top: 30px; right: 20px; z-index: 30001;
            padding: 15px 25px; background: #d4af37; color: #002d5e;
            border-radius: 10px; font-weight: bold; border: none;
        }

        /* Слой для клика, чтобы развернуть видео */
        #clickOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; display: none;
        }

        #statusText {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; color: #fff; background: rgba(0,0,0,0.6);
            padding: 10px 25px; border-radius: 30px; border: 1px solid #d4af37;
            font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>

    <button id="startButton">Оживить фото</button>
    <div id="statusText">Загрузка системы...</div>
    <div id="clickOverlay"></div>

    <div id="fsContainer">
        <button id="closeBtn">Закрыть [X]</button>
        <video id="fsVideo" controls playsinline webkit-playsinline></video>
    </div>

    <a-scene id="main-scene" embedded 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets id="video-assets"></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const squadId = params.get('squad') || '1'; 
        const count = parseInt(params.get('count')) || 4; 

        const sceneEl = document.querySelector('#main-scene');
        const startBtn = document.getElementById('startButton');
        const fsContainer = document.getElementById('fsContainer');
        const fsVideo = document.getElementById('fsVideo');
        const closeBtn = document.getElementById('closeBtn');
        const clickOverlay = document.getElementById('clickOverlay');
        const statusText = document.getElementById('statusText');

        let activeVideo = null;

        // Настройка MindAR: высокая стабилизация для "магии"
        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./targets/squad${squadId}.mind; autoStart: false; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 5;`);

        for (let i = 0; i < count; i++) {
            const v = document.createElement('video');
            v.id = `vid${i}`;
            v.src = `./videos/${squadId}_${i}.mp4`;
            v.setAttribute('loop', 'true');
            v.setAttribute('crossorigin', 'anonymous');
            v.setAttribute('playsinline', '');
            v.muted = true;
            document.getElementById('video-assets').appendChild(v);

            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            // ВОТ ОНА МАГИЯ: видео отображается прямо на фото
            const plane = document.createElement('a-video');
            plane.setAttribute('src', `#vid${i}`);
            plane.setAttribute('width', '1'); 
            plane.setAttribute('height', '0.56'); // Горизонтальное видео
            
            entity.appendChild(plane);
            sceneEl.appendChild(entity);

            entity.addEventListener('targetFound', () => {
                v.play();
                activeVideo = v;
                clickOverlay.style.display = 'block';
                statusText.style.display = 'none';
            });

            entity.addEventListener('targetLost', () => {
                // Если мы НЕ смотрим в полный экран, ставим на паузу
                if (fsContainer.style.display !== 'flex') {
                    v.pause();
                    activeVideo = null;
                    clickOverlay.style.display = 'none';
                    statusText.style.display = 'block';
                    statusText.innerText = "Поиск фотографии...";
                }
            });
        }

        // КЛИК -> Переход из AR в Fullscreen без черного экрана
        clickOverlay.addEventListener('click', () => {
            if (!activeVideo) return;

            fsVideo.src = activeVideo.src;
            fsVideo.currentTime = activeVideo.currentTime; // Синхронизация времени
            
            activeVideo.pause(); 
            fsContainer.style.display = 'flex';
            fsVideo.play();
        });

        // ЗАКРЫТЬ -> Возврат к "магии" на бумаге
        closeBtn.addEventListener('click', () => {
            if (activeVideo) {
                activeVideo.currentTime = fsVideo.currentTime;
            }
            fsVideo.pause();
            fsVideo.src = "";
            fsContainer.style.display = 'none';
        });

        sceneEl.addEventListener('ready', () => {
            statusText.innerText = "Система готова";
            startBtn.style.display = 'block';
        });

        startBtn.addEventListener('click', () => {
            sceneEl.systems['mindar-image-system'].start();
            startBtn.style.display = 'none';
            statusText.innerText = "Наведите на фото курсанта";
        });
    </script>
</body>
</html>
