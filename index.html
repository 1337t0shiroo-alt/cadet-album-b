<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>AR Альбом - ДВЮИ МВД</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #startButton {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 20px 40px; font-size: 18px; font-weight: bold;
            background: #002d5e; color: #d4af37; border: 2px solid #d4af37;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
        }

        /* КОНТЕЙНЕР ДЛЯ ВИДЕО-ПЛЕЕРА */
        #videoContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 20000;
            display: none; align-items: center; justify-content: center;
        }
        
        #mainVideo {
            width: 100%; max-height: 80vh; border: 2px solid #d4af37;
        }

        #closeButton {
            position: absolute; top: 30px; right: 20px;
            padding: 15px 25px; background: #d4af37; color: #002d5e;
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        #overlay {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9998; color: #fff; background: rgba(0,0,0,0.6);
            padding: 10px 25px; border-radius: 30px; border: 1px solid #d4af37;
        }
    </style>
</head>
<body>

    <button id="startButton">ЗАПУСТИТЬ КАМЕРУ</button>

    <div id="videoContainer">
        <div id="closeButton">ЗАКРЫТЬ X</div>
        <video id="mainVideo" controls playsinline></video>
    </div>

    <div id="overlay">Наведите камеру на фотографию</div>

    <a-scene id="main-scene" 
        mindar-image="autoStart: false; uiScanning: no;" 
        embedded color-space="sRGB" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const squadId = params.get('squad') || '1'; 
        const count = parseInt(params.get('count')) || 4; 

        const sceneEl = document.querySelector('#main-scene');
        const startButton = document.getElementById('startButton');
        const videoContainer = document.getElementById('videoContainer');
        const mainVideo = document.getElementById('mainVideo');
        const closeButton = document.getElementById('closeButton');

        // Подключаем только маркеры
        sceneEl.setAttribute('mindar-image', `imageTargetSrc: ./targets/squad${squadId}.mind; autoStart: false; uiScanning: no;`);

        // Создаем скрытые цели
        for (let i = 0; i < count; i++) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            // Как только цель найдена
            entity.addEventListener('targetFound', () => {
                const videoPath = `./videos/${squadId}_${i}.mp4`;
                
                // Если плеер уже открыт — ничего не делаем
                if (videoContainer.style.display === 'flex') return;

                // Загружаем видео в главный плеер
                mainVideo.src = videoPath;
                videoContainer.style.display = 'flex';
                mainVideo.play();
            });

            sceneEl.appendChild(entity);
        }

        // Кнопка закрытия плеера
        closeButton.addEventListener('click', () => {
            mainVideo.pause();
            mainVideo.src = "";
            videoContainer.style.display = 'none';
        });

        startButton.addEventListener('click', () => {
            sceneEl.systems['mindar-image-system'].start();
            startButton.style.display = 'none';
        });
    </script>
</body>
</html>
